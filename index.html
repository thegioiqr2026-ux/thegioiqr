<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thế Giới QR | Quản Lý Mã QR Chuyên Nghiệp</title>
    
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 700px; margin: 20px auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        /* App UI */
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .btn-secondary { background: #6c757d; margin-top: 5px; }

        /* QR Result Area */
        #qr-display-area { text-align: center; margin-top: 20px; padding: 20px; border: 2px dashed #eee; border-radius: 10px; }
        #qrcode img { display: inline-block; margin-bottom: 10px; border: 4px solid #fff; }

        /* History Table */
        .history-section { margin-top: 40px; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        .history-table th { background: #f1f1f1; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
        .history-table td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .qr-thumb { width: 50px; height: 50px; border: 1px solid #eee; }
        .link-text { color: #2980b9; word-break: break-all; max-width: 150px; display: block; }
        
        .hidden { display: none; }
        .auth-box { max-width: 400px; margin: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color: var(--dark);">THEGIOI<span style="color:var(--primary)">QR</span>.COM</h2>

    <div id="auth-section" class="auth-box">
        </div>

    <div id="main-app" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span>Xin chào, <b id="user-display"></b></span>
            <button onclick="logout()" style="width:auto; padding: 5px 15px; font-size: 12px; background:#e74c3c;">Thoát</button>
        </div>

        <div id="input-form">
            <input type="text" id="qr-title" placeholder="Tên mã QR (VD: Menu quán ăn)">
            <input type="text" id="qr-link" placeholder="Nhập link (https://...)">
            <button onclick="generateQR()"><i class="fas fa-qrcode"></i> TẠO MÃ QR</button>
        </div>

        <div id="qr-display-area" class="hidden">
            <div id="qrcode"></div>
            <button id="download-btn" style="width:auto; padding: 10px 20px; background:#34495e;"><i class="fas fa-download"></i> Tải xuống</button>
            <button onclick="resetForm()" class="btn-secondary" style="width:auto; padding: 10px 20px;"><i class="fas fa-plus"></i> Tạo mã khác</button>
        </div>

        <div class="history-section">
            <h3><i class="fas fa-history"></i> Lịch sử tạo mã</h3>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Mã QR</th>
                        <th>Thông tin</th>
                        <th>Thời gian</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- CONFIG FIREBASE & EMAILJS (Dùng thông tin của bạn đã chạy ổn) ---
    const firebaseConfig = { /* Thông tin của bạn */ };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let qrcode = new QRCode(document.getElementById("qrcode"), { width: 180, height: 180 });

    // --- HÀM TẠO QR ---
    async function generateQR() {
        const title = document.getElementById('qr-title').value;
        const link = document.getElementById('qr-link').value;
        
        if(!title || !link) return alert("Vui lòng nhập đủ Tên và Link!");

        // 1. Hiện QR lên màn hình
        qrcode.clear();
        qrcode.makeCode(link);
        document.getElementById('qr-display-area').classList.remove('hidden');
        document.getElementById('input-form').classList.add('hidden');

        // 2. Lưu vào Firebase
        const user = auth.currentUser;
        await db.collection('qrcodes').add({
            uid: user.uid,
            title: title,
            url: link,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // 3. Xử lý nút tải xuống
        setTimeout(() => {
            const imgData = document.querySelector("#qrcode img").src;
            document.getElementById('download-btn').onclick = () => {
                const a = document.createElement("a");
                a.href = imgData; a.download = title + ".png"; a.click();
            };
        }, 500);

        loadHistory(user.uid);
    }

    // --- HÀM TẠO MÃ KHÁC (RESET) ---
    function resetForm() {
        document.getElementById('qr-title').value = "";
        document.getElementById('qr-link').value = "";
        document.getElementById('qr-display-area').classList.add('hidden');
        document.getElementById('input-form').classList.remove('hidden');
        qrcode.clear();
    }

    // --- HÀM TẢI LỊCH SỬ CHI TIẾT ---
    async function loadHistory(uid) {
        const snapshot = await db.collection('qrcodes')
                                .where('uid', '==', uid)
                                .orderBy('createdAt', 'desc')
                                .limit(20).get();
        
        const tbody = document.getElementById('history-body');
        tbody.innerHTML = "";

        snapshot.forEach(doc => {
            const data = doc.data();
            const timeStr = data.createdAt ? new Intl.DateTimeFormat('vi-VN', {
                dateStyle: 'short', timeStyle: 'short'
            }).format(data.createdAt.toDate()) : "...";

            // Tạo hàng cho bảng lịch sử
            const row = `
                <tr>
                    <td><div id="mini-qr-${doc.id}" class="qr-thumb"></div></td>
                    <td>
                        <b>${data.title}</b><br>
                        <a href="${data.url}" target="_blank" class="link-text">${data.url}</a>
                    </td>
                    <td>${timeStr}</td>
                    <td>
                        <button onclick="reUse('${data.title}', '${data.url}')" style="padding:5px; font-size:11px; width:auto;">Dùng</button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;

            // Tạo QR nhỏ (thumbnail) cho từng dòng
            setTimeout(() => {
                new QRCode(document.getElementById(`mini-qr-${doc.id}`), {
                    text: data.url, width: 50, height: 50
                });
            }, 100);
        });
    }

    function reUse(title, url) {
        document.getElementById('qr-title').value = title;
        document.getElementById('qr-link').value = url;
        generateQR();
    }

    // --- LOGIC AUTH (Giữ nguyên phần onAuthStateChanged cũ của bạn) ---
    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.displayName || user.email;
            loadHistory(user.uid);
        }
    });
</script>
</body>
</html>
