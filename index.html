<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC - Quản Lý QR v1.36.1</title>
    <link rel="icon" type="image/jpeg" href="logo_Group.jpg">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --sidebar-width: 280px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; display: flex; min-height: 100vh; }
        
        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: var(--dark); color: white; position: fixed; height: 100%; z-index: 1000; transition: 0.3s; }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #34495e; }
        .sidebar-header img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 10px; }
        .nav-link { padding: 15px 25px; display: block; color: #bdc3c7; text-decoration: none; cursor: pointer; border-left: 5px solid transparent; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: #34495e; color: white; border-left-color: var(--primary); }
        
        /* MAIN CONTENT */
        #main-content { margin-left: var(--sidebar-width); flex: 1; padding: 25px; width: calc(100% - var(--sidebar-width)); }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        /* TABLE STYLES */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 13px; color: #7f8c8d; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #f2f2f2; vertical-align: middle; }
        
        /* UTILS */
        .btn-icon { width: 32px; height: 32px; border-radius: 8px; border: none; color: white; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; margin-right: 4px; transition: 0.2s; }
        .btn-icon:hover { opacity: 0.8; transform: translateY(-2px); }
        .copy-badge { font-size: 11px; color: var(--primary); cursor: pointer; background: #e8f5e9; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; }
        .click-count { background: #e3f2fd; color: #1976d2; padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        .hidden { display: none !important; }
        
        /* PLAY OVERLAY */
        #play-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: none; flex-direction: column; padding: 20px; }
        .monitor-grid { display: flex; gap: 20px; flex: 1; margin-top: 20px; }
        .monitor-left { flex: 1; border: 1px solid #eee; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .monitor-right { flex: 1; background: #000; border-radius: 15px; overflow: hidden; position: relative; }

        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); }
            #main-content { margin-left: 0; width: 100%; }
            .monitor-grid { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <img src="logo_Group.jpg">
            <h3 style="letter-spacing: 1px;">VDC <span style="color:var(--primary)">TRAINING</span></h3>
            <div id="acc-info" style="margin-top:15px; font-size:12px; border-top:1px solid #34495e; padding-top:15px;">
                <b id="user-name" style="color:var(--primary); font-size:14px;">Đang tải...</b><br>
                <span id="user-email" style="opacity:0.6">---</span>
            </div>
        </div>
        <div class="nav-link active" onclick="showPage('history-page', this)"><i class="fas fa-qrcode"></i> Mã QR của tôi</div>
        <div class="nav-link" onclick="navToCreate(this)"><i class="fas fa-plus-circle"></i> Tạo kịch bản mới</div>
        <div class="nav-link" onclick="logout()" style="color:#ff7675; margin-top:50px;"><i class="fas fa-sign-out-alt"></i> Đăng xuất</div>
    </div>

    <div id="main-content">
        <div id="history-page" class="page">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2>Quản Lý Mã QR</h2>
                    <button class="btn-icon" style="background:var(--primary); width:auto; padding:0 15px;" onclick="navToCreate()"><i class="fas fa-plus"></i> Tạo mới</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Thời gian</th>
                                <th>Nội dung QR</th>
                                <th>Đang phát</th>
                                <th style="text-align:center;">Lượt quét</th>
                                <th style="text-align:center;">Công cụ</th>
                            </tr>
                        </thead>
                        <tbody id="history-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="create-page" class="page hidden">
            <div class="card">
                <h2 id="form-title">Thiết lập QR</h2>
                <input type="hidden" id="edit-id">
                <input type="text" id="qr-title" placeholder="Tên bài giảng / Nhóm QR" style="width:100%; padding:12px; margin:15px 0; border:1px solid #ddd; border-radius:8px;">
                <div id="links-container-v136"></div>
                <button onclick="addLinkRow()" style="background:#3498db; color:white; width:100%; border:none; padding:10px; margin:10px 0; border-radius:8px; cursor:pointer;">+ Thêm dòng nội dung</button>
                
                <div style="margin-top:20px; display:flex; align-items:center; background:#f0f2f5; padding:10px; border-radius:8px;">
                    <span style="font-weight:bold; color:#666;">Link rút gọn: thegioiqr.com/</span>
                    <input type="text" id="qr-short-name" placeholder="ten-tuy-chinh" style="border:none; background:transparent; padding:5px; flex:1; outline:none; font-weight:bold; color:var(--primary);">
                </div>
                <button onclick="saveQR()" style="background:var(--primary); color:white; width:100%; border:none; padding:15px; margin-top:20px; border-radius:10px; font-weight:bold; cursor:pointer;">LƯU KỊCH BẢN</button>
            </div>
        </div>
    </div>

    <div id="play-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="play-title">---</h2>
            <button onclick="closePlay()" style="background:#e74c3c; color:white; border:none; padding:10px 25px; border-radius:8px; cursor:pointer;">ĐÓNG</button>
        </div>
        <select id="play-select" onchange="changeContent(this.value)" style="width:100%; padding:15px; margin-top:15px; border-radius:10px; border:2px solid var(--primary); font-size:18px; font-weight:bold;"></select>
        
        <div class="monitor-grid">
            <div class="monitor-left">
                <div id="play-qr-big"></div>
                <p style="margin-top:15px; font-weight:bold; color:var(--primary);">HỌC VIÊN QUÉT MÃ NÀY</p>
            </div>
            <div class="monitor-right">
                <div id="monitor-frame" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:white;">Đang tải xem trước...</div>
            </div>
        </div>
    </div>

    <div id="qr-hidden" class="hidden"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCjZfDgE4JFRilXh5dCtrTFLA3-BlerRNE", authDomain: "thegioiqr-2026.firebaseapp.com", projectId: "thegioiqr-2026", storageBucket: "thegioiqr-2026.firebasestorage.app", messagingSenderId: "911702916265", appId: "1:911702916265:web:d42d948ebb7e7a53dcbdb8" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); const db = firebase.firestore();
    
    let currentLinks = []; let editId = "";

    // 1. Quản lý điều hướng
    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(btn) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
        }
        if(id === 'history-page') loadHistory();
    }

    // 2. Tải danh sách QR (Sắp xếp mới nhất + Analytics)
    async function loadHistory() {
        const user = auth.currentUser;
        // Lấy lượt quét trước
        const logSnap = await db.collection('click_logs').get();
        let counts = {};
        logSnap.forEach(l => { const qid = l.data().qr_id; counts[qid] = (counts[qid] || 0) + 1; });

        const snap = await db.collection('qrcodes').where('uid', '==', user.uid).orderBy('date', 'desc').get();
        const list = document.getElementById('history-list');
        list.innerHTML = "";

        snap.forEach(doc => {
            const d = doc.data();
            const qid = doc.id;
            const shortUrl = `thegioiqr.com/${qid}`;
            const activeLabel = d.links ? (d.links[d.active_index || 0]?.label || "N/A") : "---";
            const dateStr = d.date ? d.date.toDate().toLocaleString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '---';

            list.innerHTML += `
                <tr>
                    <td style="font-size:11px; color:#888;">${dateStr}</td>
                    <td>
                        <b>${d.title}</b><br>
                        <span class="copy-badge" onclick="copyText('${shortUrl}')"><i class="fas fa-link"></i> ${shortUrl}</span>
                    </td>
                    <td><small style="color:var(--primary); font-weight:bold;">${activeLabel}</small></td>
                    <td style="text-align:center;"><span class="click-count">${counts[qid] || 0}</span></td>
                    <td style="text-align:center;">
                        <button class="btn-icon" style="background:#27ae60" onclick="openPlay('${qid}')" title="Play"><i class="fas fa-play"></i></button>
                        <button class="btn-icon" style="background:#3498db" onclick="downloadQR('${qid}')" title="Tải mã"><i class="fas fa-download"></i></button>
                        <button class="btn-icon" style="background:#f39c12" onclick="editQR('${qid}')" title="Sửa"><i class="fas fa-edit"></i></button>
                        <button class="btn-icon" style="background:#e74c3c" onclick="deleteQR('${qid}')" title="Xóa"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
        });
    }

    // 3. Công cụ nhanh
    function copyText(txt) {
        navigator.clipboard.writeText(txt);
        alert("Đã copy link: " + txt);
    }

    function downloadQR(id) {
        const div = document.createElement('div');
        new QRCode(div, { text: `https://thegioiqr.com/go1.html?id=${id}`, width: 500, height: 500 });
        setTimeout(() => {
            const img = div.querySelector('img').src;
            const link = document.createElement('a');
            link.href = img;
            link.download = `QR_${id}.png`;
            link.click();
        }, 300);
    }

    // 4. Play Mode với Monitor
    async function openPlay(id) {
        editId = id;
        const doc = await db.collection('qrcodes').doc(id).get();
        const d = doc.data();
        currentLinks = d.links || [];
        
        document.getElementById('play-title').innerText = d.title;
        document.getElementById('play-overlay').style.display = 'flex';
        
        const sel = document.getElementById('play-select');
        sel.innerHTML = "";
        currentLinks.forEach((l, i) => {
            const opt = document.createElement('option');
            opt.value = i; opt.innerText = l.label;
            if(i == (d.active_index || 0)) opt.selected = true;
            sel.appendChild(opt);
        });

        document.getElementById('play-qr-big').innerHTML = "";
        new QRCode(document.getElementById('play-qr-big'), { text: `https://thegioiqr.com/go1.html?id=${id}`, width: 250, height: 250 });
        updateMonitor(currentLinks[d.active_index || 0].url);
    }

    async function changeContent(idx) {
        await db.collection('qrcodes').doc(editId).update({ active_index: parseInt(idx) });
        updateMonitor(currentLinks[idx].url);
    }

    function updateMonitor(url) {
        const frame = document.getElementById('monitor-frame');
        if(url.includes('youtube.com') || url.includes('youtu.be')) {
            const vid = url.split('v=')[1] || url.split('/').pop();
            frame.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}" frameborder="0" allowfullscreen></iframe>`;
        } else if(url.match(/\.(jpeg|jpg|gif|png)$/)) {
            frame.innerHTML = `<img src="${url}" style="max-width:100%; max-height:100%;">`;
        } else {
            frame.innerHTML = `<div style="text-align:center; padding:20px;"><i class="fas fa-file-alt" style="font-size:50px;"></i><br><br>Tài liệu: ${new URL(url).hostname}<br><a href="${url}" target="_blank" style="color:white; text-decoration:underline;">Bấm để xem thử</a></div>`;
        }
    }

    // 5. Auth & Sidebar Info
    auth.onAuthStateChanged(async user => {
        if(user) {
            const uDoc = await db.collection('users').doc(user.uid).get();
            if(uDoc.exists) {
                document.getElementById('user-name').innerText = uDoc.data().name;
                document.getElementById('user-email').innerText = user.email;
            }
            showPage('history-page');
        } else {
            // Chuyển hướng về login nếu chưa đăng nhập
            window.location.href = "login.html"; 
        }
    });

    function closePlay() { document.getElementById('play-overlay').style.display = 'none'; loadHistory(); }
    function logout() { auth.signOut().then(() => location.reload()); }

    // Phần Create/Edit (Giữ nguyên logic thêm dòng của bạn)
    function addLinkRow(l='', u='') {
        const container = document.getElementById('links-container-v136');
        const div = document.createElement('div');
        div.style = "display:flex; gap:10px; margin-bottom:10px;";
        div.innerHTML = `<input type="text" class="l-label" placeholder="Tên mục" value="${l}" style="flex:1; padding:8px; border-radius:5px; border:1px solid #ddd;"><input type="text" class="l-url" placeholder="Link" value="${u}" style="flex:2; padding:8px; border-radius:5px; border:1px solid #ddd;"><button onclick="this.parentElement.remove()" style="background:none; border:none; color:red; cursor:pointer;">×</button>`;
        container.appendChild(div);
    }

    async function editQR(id) {
        const doc = await db.collection('qrcodes').doc(id).get();
        const d = doc.data();
        editId = id;
        document.getElementById('edit-id').value = id;
        document.getElementById('qr-title').value = d.title;
        document.getElementById('qr-short-name').value = id;
        document.getElementById('links-container-v136').innerHTML = "";
        d.links.forEach(l => addLinkRow(l.label, l.url));
        showPage('create-page');
    }

    async function saveQR() {
        const title = document.getElementById('qr-title').value;
        const short = document.getElementById('qr-short-name').value.trim();
        const labels = document.querySelectorAll('.l-label');
        const urls = document.querySelectorAll('.l-url');
        let arr = [];
        labels.forEach((l, i) => { if(l.value && urls[i].value) arr.push({label: l.value, url: urls[i].value}); });
        
        const data = { title, links: arr, uid: auth.currentUser.uid, date: firebase.firestore.Timestamp.now(), active_index: 0 };
        if(editId && editId !== short) await db.collection('qrcodes').doc(editId).delete();
        await db.collection('qrcodes').doc(short || undefined).set(data, {merge:true});
        alert("Đã lưu kịch bản!");
        showPage('history-page');
    }

    function navToCreate(btn) {
        editId = "";
        document.getElementById('edit-id').value = "";
        document.getElementById('qr-title').value = "";
        document.getElementById('qr-short-name').value = "";
        document.getElementById('links-container-v136').innerHTML = "";
        addLinkRow();
        showPage('create-page', btn);
    }
</script>
</body>
</html>
