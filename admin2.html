<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Tối Cao | Version 1.6</title>
    <link rel="icon" type="image/jpeg" href="logo_Group.jpg">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --danger: #e74c3c; --sidebar-width: 260px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; display: flex; min-height: 100vh; }
        #admin-login-view { position: fixed; inset: 0; z-index: 9999; display: flex; justify-content: center; align-items: center; background: var(--dark); color: white; }
        .admin-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; color: var(--dark); }
        input { padding: 10px; border: 1.5px solid #eee; border-radius: 8px; outline: none; margin: 5px; }
        #sidebar { width: var(--sidebar-width); background: var(--dark); color: white; position: fixed; height: 100%; }
        .sidebar-header { padding: 25px; text-align: center; border-bottom: 1px solid #34495e; }
        .nav-link { padding: 15px 25px; display: block; color: #bdc3c7; text-decoration: none; cursor: pointer; }
        .nav-link.active { background: #34495e; color: white; border-left: 5px solid var(--primary); }
        #main-content { margin-left: var(--sidebar-width); flex: 1; padding: 25px; width: calc(100% - var(--sidebar-width)); }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #fafafa; color: #7f8c8d; padding: 12px; text-align: left; cursor: pointer; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .btn-action { padding: 6px 10px; border-radius: 6px; border: none; color: white; cursor: pointer; margin: 2px; font-size: 12px; }
        .btn-delete { background: var(--danger); }
        .btn-lock { background: #f39c12; }
        .btn-unlock { background: var(--primary); }
        .hidden { display: none !important; }
        a.table-link { color: var(--primary); font-weight: bold; text-decoration: none; }
        a.table-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div id="admin-login-view">
        <div class="admin-card">
            <img src="logo_Group.jpg" style="width:70px; border-radius:50%; margin-bottom:15px;">
            <h2>VDC ADMIN</h2>
            <input type="email" id="admin-email" placeholder="Email Admin">
            <input type="password" id="admin-pass" placeholder="Mật khẩu">
            <button onclick="handleAdminLogin()" style="background:var(--primary); color:white; width:100%; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:10px;">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden" style="width:100%; display:flex;">
        <div id="sidebar">
            <div class="sidebar-header">
                <img src="logo_Group.jpg" style="width:60px; border-radius:50%;">
                <h4 style="margin-top:10px;">MR. AN TOÀN</h4>
            </div>
            <div id="nav-users" class="nav-link active" onclick="showSec('users', this)"><i class="fas fa-users"></i> Người dùng</div>
            <div id="nav-qrs" class="nav-link" onclick="showSec('qrs', this)"><i class="fas fa-qrcode"></i> Quản lý mã QR</div>
            <div id="nav-config" class="nav-link" onclick="showSec('config', this)"><i class="fas fa-cog"></i> Cấu hình</div>
            
            <div class="nav-link" onclick="logoutAdmin()" style="color:#ff7675; margin-top:50px;"><i class="fas fa-power-off"></i> Thoát</div>
        </div>

        <div id="main-content">
            <div id="sec-users" class="admin-sec">
                <div class="card">
                    <h2>Người dùng hệ thống</h2>
                    <div style="overflow-x: auto;">
                        <table id="userTable">
                            <thead>
                                <tr>
                                    <th>Họ tên / Email</th>
                                    <th>Ngày đăng ký</th>
                                    <th>Trạng thái</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="user-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="sec-qrs" class="admin-sec hidden">
                <div class="card">
                    <h2>Kiểm soát mã QR toàn hệ thống</h2>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID / Tiêu đề</th>
                                    <th>Tác giả (Email)</th>
                                    <th>Link đích</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="qr-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="sec-config" class="admin-sec hidden">
                <div class="card">
                    <h2>Cấu hình giới hạn</h2>
                    Ngày: <input type="number" id="l-day"> 
                    Phút: <input type="number" id="l-min">
                    <button onclick="saveLimit()" style="background:var(--primary); color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer;">Lưu</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCjZfDgE4JFRilXh5dCtrTFLA3-BlerRNE", authDomain: "thegioiqr-2026.firebaseapp.com", projectId: "thegioiqr-2026", storageBucket: "thegioiqr-2026.firebasestorage.app", messagingSenderId: "911702916265", appId: "1:911702916265:web:d42d948ebb7e7a53dcbdb8" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const ADMIN_EMAIL = "thegioiqr2026@gmail.com";

    // Hàm định dạng ngày giờ dd/MM/yyyy HH:mm
    function formatDateTime(date) {
        if (!date) return "29/03/2026 12:00";
        let d = date instanceof Date ? date : date.toDate();
        let day = String(d.getDate()).padStart(2, '0');
        let month = String(d.getMonth() + 1).padStart(2, '0');
        let year = d.getFullYear();
        let hour = String(d.getHours()).padStart(2, '0');
        let min = String(d.getMinutes()).padStart(2, '0');
        return `${day}/${month}/${year} ${hour}:${min}`;
    }

    async function handleAdminLogin() {
        const e = document.getElementById('admin-email').value;
        const p = document.getElementById('admin-pass').value;
        if(e !== ADMIN_EMAIL) return alert("Bạn không có quyền!");
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Sai thông tin!"); }
    }

    auth.onAuthStateChanged(user => {
        if (user && user.email === ADMIN_EMAIL) {
            document.getElementById('admin-login-view').classList.add('hidden');
            document.getElementById('admin-dashboard').classList.remove('hidden');
            loadUsers();
            loadConfig();
        } else {
            document.getElementById('admin-login-view').classList.remove('hidden');
            document.getElementById('admin-dashboard').classList.add('hidden');
            if(user) { auth.signOut(); window.location.href="index.html"; }
        }
    });

    function showSec(id, btn) {
        document.querySelectorAll('.admin-sec').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        btn.classList.add('active');
        if(id === 'users') loadUsers();
        if(id === 'qrs') loadQRs();
    }

    async function loadConfig() {
        const doc = await db.collection('settings').doc('global_config').get();
        if(doc.exists) {
            document.getElementById('l-day').value = doc.data().limit_per_day;
            document.getElementById('l-min').value = doc.data().limit_per_min;
        }
    }

    async function saveLimit() {
        await db.collection('settings').doc('global_config').set({ 
            limit_per_day: parseInt(document.getElementById('l-day').value), 
            limit_per_min: parseInt(document.getElementById('l-min').value) 
        });
        alert("Đã lưu!");
    }

    function loadUsers() {
        db.collection('users').onSnapshot(snap => {
            const body = document.getElementById('user-list');
            body.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                const isLocked = u.status === 'locked';
                const regDateText = formatDateTime(u.date);
                body.innerHTML += `<tr>
                    <td><b>${u.name}</b><br><small>${u.email}</small></td>
                    <td>${regDateText}</td>
                    <td><span style="color:${isLocked?'red':'green'}">${u.status || 'active'}</span></td>
                    <td>
                        <button class="btn-action ${isLocked?'btn-unlock':'btn-lock'}" onclick="toggleUser('${doc.id}','${isLocked?'active':'locked'}')"><i class="fas fa-${isLocked?'unlock':'lock'}"></i></button>
                        <button class="btn-action btn-delete" onclick="deleteUser('${doc.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
        });
    }

    function loadQRs() {
        // Lấy tất cả user để map Email tác giả
        db.collection('users').get().then(userSnap => {
            let userMap = {};
            userSnap.forEach(uDoc => userMap[uDoc.id] = uDoc.data().email);

            db.collection('qrcodes').orderBy('date', 'desc').limit(100).onSnapshot(snap => {
                const body = document.getElementById('qr-list');
                body.innerHTML = "";
                snap.forEach(doc => {
                    const q = doc.data();
                    const authorEmail = userMap[q.uid] || "Ẩn danh";
                    body.innerHTML += `<tr>
                        <td><b>${q.title}</b><br><small>ID: ${doc.id}</small></td>
                        <td>${authorEmail}</td>
                        <td><a href="${q.url}" target="_blank" class="table-link">Mở Link <i class="fas fa-external-link-alt" style="font-size:10px"></i></a></td>
                        <td><button class="btn-action btn-delete" onclick="deleteQR('${doc.id}')"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
                });
            });
        });
    }

    async function toggleUser(id, st) { await db.collection('users').doc(id).update({ status: st }); }
    async function deleteUser(id) { if(confirm("Xóa người dùng này?")) await db.collection('users').doc(id).delete(); }
    async function deleteQR(id) { if(confirm("Xóa mã này?")) await db.collection('qrcodes').doc(id).delete(); }
    function logoutAdmin() { auth.signOut(); }
</script>
</body>
</html>
