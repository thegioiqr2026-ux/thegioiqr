<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thế Giới QR | Version 1.31</title>
    <style>
        /* Thêm một chút CSS cho Dropdown Play Mode dễ nhìn hơn trên điện thoại */
        .play-select { width: 100%; padding: 15px; border-radius: 30px; border: 3px solid #27ae60; font-size: 18px; font-weight: bold; background: #fff; margin-top: 15px; cursor: pointer; }
        #play-title-display { font-size: 20px; color: #2c3e50; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="sidebar" class="hide">
        <div class="sidebar-header">
            <img src="logo_Group.jpg" alt="Logo">
            <h3>THEGIOI<span style="color:#27ae60">QR</span> <small style="font-size: 10px; color: #888;">v1.31</small></h3>
            </div>
        </div>

    <div id="main-wrapper">
        <div id="main-content">
            <div class="topbar">
                <i class="fas fa-bars" onclick="toggleSidebar()"></i>
                <strong>THEGIOIQR.COM <span style="color:#27ae60">v1.31</span></strong>
                <img src="logo_Group.jpg" style="width:30px; border-radius:50%;">
            </div>

            </div>
        <footer>
            <img src="logo_Group.jpg" style="width:40px; border-radius:50%; margin-bottom:10px;">
            <div>Hệ thống vận hành bởi <b>Mr. An Toàn - 0399.496.319</b></div>
            <div style="font-size: 11px; opacity: 0.7; margin-top: 5px;">Phiên bản 1.31 (Multi-Link Enabled)</div>
        </footer>
    </div>

    <div id="play-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom: 15px; border-bottom: 1px solid #eee;">
            <div style="text-align: left;">
                <h2 id="play-title-display">Đang điều khiển...</h2>
                <span style="color: #27ae60; font-weight: bold; font-size: 12px;">● TRỰC TIẾP</span>
            </div>
            <button onclick="closePlayMode()" style="background:#e74c3c; color:white; padding:10px 20px; border-radius: 10px; border:none; font-weight: bold;">ĐÓNG</button>
        </div>
        <div id="play-qr-canvas" style="margin: 20px auto; width: 220px; height: 220px; padding: 10px; background: white; border: 1px solid #eee; border-radius: 15px;"></div>
        <p style="color: #666; font-size: 14px;">Quét mã này để xem nội dung bạn chọn bên dưới</p>
        <div style="max-width: 500px; margin: 25px auto;">
            <label style="font-weight: bold; color: #27ae60; display: block; margin-bottom: 5px;">CHỌN NỘI DUNG PHÁT:</label>
            <select id="play-dropdown" class="play-select" onchange="syncPlayContent(this.value)"></select>
        </div>
    </div>

    <script>
        // Cập nhật nhãn hiển thị trong hàm loadHistory
        // ... (Trong hàm loadHistory, hãy đảm bảo dòng text hiển thị v1.31)
    </script>
</body>
</html>
