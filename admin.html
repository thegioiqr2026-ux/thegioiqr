<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Tối Cao | Thế Giới QR</title>
    
    <link rel="icon" type="image/jpeg" href="logo_Group.jpg">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --danger: #e74c3c; --sidebar-width: 260px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; display: flex; min-height: 100vh; }

        /* LOGIN VIEW */
        #admin-login-view { 
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: var(--dark); color: white; padding: 20px;
        }
        .admin-card { 
            background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); color: var(--dark); text-align: center;
        }
        .admin-card img { width: 80px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 10px; outline: none; }
        .btn-admin-login { background: var(--primary); color: white; width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* DASHBOARD LAYOUT */
        #admin-dashboard { display: none; width: 100%; }
        #sidebar { width: var(--sidebar-width); background: var(--dark); color: white; position: fixed; height: 100%; }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #34495e; }
        .nav-link { padding: 15px 25px; display: block; color: #bdc3c7; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: #34495e; color: white; border-left: 5px solid var(--primary); }

        #main-content { margin-left: var(--sidebar-width); flex: 1; padding: 30px; width: calc(100% - var(--sidebar-width)); }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        
        /* TABLES */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; color: #7f8c8d; font-size: 12px; text-transform: uppercase; }

        /* BUTTONS */
        .btn-action { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; color: white; transition: 0.2s; }
        .btn-delete { background: var(--danger); }
        .btn-delete:hover { background: #c0392b; }
        .btn-lock { background: #f39c12; }
        .btn-unlock { background: var(--primary); }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            #sidebar { display: none; }
            #main-content { margin-left: 0; padding: 15px; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="admin-login-view">
        <div class="admin-card">
            <img src="logo_Group.jpg">
            <h2 style="margin-bottom: 20px;">VDC ADMIN PANEL</h2>
            <input type="email" id="admin-email" placeholder="Email Quản Trị">
            <input type="password" id="admin-pass" placeholder="Mật khẩu">
            <button class="btn-admin-login" onclick="handleAdminLogin()">ĐĂNG NHẬP HỆ THỐNG</button>
            <p style="margin-top:15px; font-size:12px; color:#999;">Dành riêng cho thegioiqr2026@gmail.com</p>
        </div>
    </div>

    <div id="admin-dashboard">
        <div id="sidebar">
            <div class="sidebar-header">
                <img src="logo_Group.jpg" style="width:60px; border-radius:50%;">
                <h4 style="margin-top:10px;">MR. AN TOÀN</h4>
            </div>
            <div class="nav-link active" onclick="showSec('config', this)"><i class="fas fa-cog"></i> Cấu hình</div>
            <div class="nav-link" onclick="showSec('users', this)"><i class="fas fa-users"></i> Người dùng</div>
            <div class="nav-link" onclick="showSec('qrs', this)"><i class="fas fa-qrcode"></i> Quản lý mã QR</div>
            <div class="nav-link" onclick="logoutAdmin()" style="color:#ff7675; margin-top:50px;"><i class="fas fa-power-off"></i> Đăng xuất</div>
        </div>

        <div id="main-content">
            <div id="sec-config" class="admin-sec">
                <div class="card">
                    <h2>Cấu hình giới hạn</h2>
                    Giới hạn ngày: <input type="number" id="l-day" style="width:80px;"> 
                    Giới hạn phút: <input type="number" id="l-min" style="width:80px;">
                    <button class="btn-admin-login" style="width:auto; padding:10px 20px;" onclick="saveLimit()">Lưu cấu hình</button>
                </div>
            </div>

            <div id="sec-users" class="admin-sec hidden">
                <div class="card">
                    <h2>Danh sách tài khoản</h2>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>Người dùng</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
                            <tbody id="user-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="sec-qrs" class="admin-sec hidden">
                <div class="card">
                    <h2>Kiểm soát toàn bộ mã QR</h2>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>ID/Tên</th><th>Link gốc</th><th>Hành động</th></tr></thead>
                            <tbody id="qr-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCjZfDgE4JFRilXh5dCtrTFLA3-BlerRNE", 
        authDomain: "thegioiqr-2026.firebaseapp.com", 
        projectId: "thegioiqr-2026", 
        storageBucket: "thegioiqr-2026.firebasestorage.app", 
        messagingSenderId: "911702916265", 
        appId: "1:911702916265:web:d42d948ebb7e7a53dcbdb8" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ADMIN_EMAIL = "thegioiqr2026@gmail.com";

    async function handleAdminLogin() {
        const e = document.getElementById('admin-email').value;
        const p = document.getElementById('admin-pass').value;
        if(e !== ADMIN_EMAIL) return alert("Bạn không có quyền!");
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Sai mật khẩu!"); }
    }

    auth.onAuthStateChanged(user => {
        if (user && user.email === ADMIN_EMAIL) {
            document.getElementById('admin-login-view').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'flex';
            loadConfig();
        } else {
            document.getElementById('admin-login-view').style.display = 'flex';
            document.getElementById('admin-dashboard').style.display = 'none';
            if(user) { auth.signOut(); window.location.href="index.html"; }
        }
    });

    function showSec(id, btn) {
        document.querySelectorAll('.admin-sec').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        btn.classList.add('active');
        if(id === 'users') loadUsers();
        if(id === 'qrs') loadQRs();
    }

    async function loadConfig() {
        const doc = await db.collection('settings').doc('global_config').get();
        if(doc.exists) {
            document.getElementById('l-day').value = doc.data().limit_per_day;
            document.getElementById('l-min').value = doc.data().limit_per_min;
        }
    }

    async function saveLimit() {
        const d = parseInt(document.getElementById('l-day').value);
        const m = parseInt(document.getElementById('l-min').value);
        await db.collection('settings').doc('global_config').set({ limit_per_day: d, limit_per_min: m });
        alert("Đã cập nhật!");
    }

    function loadUsers() {
        db.collection('users').onSnapshot(snap => {
            const body = document.getElementById('user-list');
            body.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                const isLocked = u.status === 'locked';
                body.innerHTML += `<tr>
                    <td><b>${u.name}</b><br><small>${u.email}</small></td>
                    <td>${u.status || 'active'}</td>
                    <td><button onclick="toggleUser('${doc.id}', '${isLocked ? 'active' : 'locked'}')" class="btn-action ${isLocked ? 'btn-unlock' : 'btn-lock'}">
                        ${isLocked ? 'Mở khóa' : 'Khóa'}
                    </button></td>
                </tr>`;
            });
        });
    }

    async function toggleUser(id, st) { await db.collection('users').doc(id).update({ status: st }); }

    // --- CẬP NHẬT HÀM LOAD QR ĐỂ HIỆN NÚT XÓA ---
    function loadQRs() {
        db.collection('qrcodes').orderBy('date', 'desc').limit(100).onSnapshot(snap => {
            const body = document.getElementById('qr-list');
            body.innerHTML = "";
            snap.forEach(doc => {
                const q = doc.data();
                body.innerHTML += `<tr>
                    <td><b>${q.title}</b><br><small>ID: ${doc.id}</small></td>
                    <td><small style="word-break:break-all;">${q.url}</small></td>
                    <td>
                        <button class="btn-action btn-delete" onclick="deleteQR('${doc.id}')">
                            <i class="fas fa-trash"></i> Xóa
                        </button>
                    </td>
                </tr>`;
            });
        });
    }

    async function deleteQR(id) {
        if(confirm("Bạn có chắc chắn muốn xóa mã QR này khỏi hệ thống?")) {
            await db.collection('qrcodes').doc(id).delete();
        }
    }

    function logoutAdmin() { auth.signOut(); }
</script>
</body>
</html>
