<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Tối Cao | Version 1.3</title>
    
    <link rel="icon" type="image/jpeg" href="logo_Group.jpg">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --danger: #e74c3c; --sidebar-width: 260px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; display: flex; min-height: 100vh; }

        #admin-login-view { position: fixed; inset: 0; z-index: 9999; display: flex; justify-content: center; align-items: center; background: var(--dark); color: white; }
        .admin-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; color: var(--dark); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 10px; }

        #sidebar { width: var(--sidebar-width); background: var(--dark); color: white; position: fixed; height: 100%; }
        .sidebar-header { padding: 25px; text-align: center; border-bottom: 1px solid #34495e; }
        .nav-link { padding: 15px 25px; display: block; color: #bdc3c7; text-decoration: none; cursor: pointer; }
        .nav-link.active { background: #34495e; color: white; border-left: 5px solid var(--primary); }

        #main-content { margin-left: var(--sidebar-width); flex: 1; padding: 25px; width: calc(100% - var(--sidebar-width)); }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #fafafa; color: #7f8c8d; cursor: pointer; padding: 12px; text-align: left; position: relative; }
        th:hover { background: #f0f0f0; }
        th::after { content: '\f0dc'; font-family: 'Font Awesome 5 Free'; font-weight: 900; position: absolute; right: 5px; opacity: 0.3; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; }

        .btn-icon { width: 30px; height: 30px; border-radius: 6px; border: none; color: white; cursor: pointer; margin-right: 3px; }
        .btn-lock { background: #f39c12; }
        .btn-delete { background: var(--danger); }
        .btn-unlock { background: var(--primary); }
        
        .hidden { display: none !important; }
        @media (max-width: 1024px) { #sidebar { display: none; } #main-content { margin-left: 0; width: 100%; } }
    </style>
</head>
<body>

    <div id="admin-login-view">
        <div class="admin-card">
            <img src="logo_Group.jpg" style="width:70px; border-radius:50%; margin-bottom:15px;">
            <h2>VDC ADMIN</h2>
            <input type="email" id="admin-email" placeholder="Email Quản Trị">
            <input type="password" id="admin-pass" placeholder="Mật khẩu">
            <button onclick="handleAdminLogin()" style="background:var(--primary); color:white; width:100%; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden" style="width:100%; display:flex;">
        <div id="sidebar">
            <div class="sidebar-header">
                <img src="logo_Group.jpg" style="width:60px; border-radius:50%;">
                <h3 style="margin-top:10px;">MR. AN TOÀN</h3>
            </div>
            <div class="nav-link active" onclick="showSec('config', this)"><i class="fas fa-cog"></i> Cấu hình</div>
            <div class="nav-link" onclick="showSec('users', this)"><i class="fas fa-users"></i> Người dùng</div>
            <div class="nav-link" onclick="showSec('qrs', this)"><i class="fas fa-qrcode"></i> Quản lý mã QR</div>
            <div class="nav-link" onclick="logoutAdmin()" style="color:#ff7675; margin-top:50px;"><i class="fas fa-power-off"></i> Thoát</div>
        </div>

        <div id="main-content">
            <div id="sec-users" class="admin-sec hidden">
                <div class="card">
                    <h2>Quản lý & Phân tích Người dùng</h2>
                    <p style="font-size: 12px; color: #888; margin-bottom: 10px;">* Bấm vào tiêu đề cột để sắp xếp dữ liệu.</p>
                    <div style="overflow-x: auto;">
                        <table id="userTable">
                            <thead>
                                <tr>
                                    <th>Họ tên / Email</th>
                                    <th onclick="sortTable(1)">Ngày đăng ký <i class="fas fa-sort"></i></th>
                                    <th onclick="sortTable(2)">Tổng mã <i class="fas fa-sort"></i></th>
                                    <th onclick="sortTable(3)">Kỷ lục/Ngày <i class="fas fa-sort"></i></th>
                                    <th>Trạng thái</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="user-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="sec-config" class="admin-sec">
                <div class="card"><h2>Giới hạn hệ thống</h2>... (Cấu hình V1.2)</div>
            </div>
            <div id="sec-qrs" class="admin-sec hidden">
                <div class="card"><h2>Kiểm soát QR</h2>... (Quản lý V1.2)</div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCjZfDgE4JFRilXh5dCtrTFLA3-BlerRNE", authDomain: "thegioiqr-2026.firebaseapp.com", projectId: "thegioiqr-2026", storageBucket: "thegioiqr-2026.firebasestorage.app", messagingSenderId: "911702916265", appId: "1:911702916265:web:d42d948ebb7e7a53dcbdb8" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const ADMIN_EMAIL = "thegioiqr2026@gmail.com";

    // --- AUTH ---
    async function handleAdminLogin() {
        const e = document.getElementById('admin-email').value;
        const p = document.getElementById('admin-pass').value;
        if(e !== ADMIN_EMAIL) return alert("Từ chối truy cập!");
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Lỗi!"); }
    }

    auth.onAuthStateChanged(user => {
        if (user && user.email === ADMIN_EMAIL) {
            document.getElementById('admin-login-view').classList.add('hidden');
            document.getElementById('admin-dashboard').classList.remove('hidden');
        } else {
            document.getElementById('admin-login-view').classList.remove('hidden');
            document.getElementById('admin-dashboard').classList.add('hidden');
        }
    });

    // --- LOGIC NGƯỜI DÙNG NÂNG CAO ---
    async function loadUsers() {
        const userSnap = await db.collection('users').get();
        const body = document.getElementById('user-list');
        body.innerHTML = "Đang tính toán dữ liệu...";
        
        let usersData = [];

        for (const doc of userSnap.docs) {
            const u = doc.data();
            const qrSnap = await db.collection('qrcodes').where('uid', '==', doc.id).get();
            
            // Tính số mã tạo nhiều nhất trong 1 ngày
            let dateCounts = {};
            qrSnap.forEach(qr => {
                const dateKey = qr.data().date.toDate().toLocaleDateString('vi-VN');
                dateCounts[dateKey] = (dateCounts[dateKey] || 0) + 1;
            });
            const maxInDay = Math.max(0, ...Object.values(dateCounts));
            const regDate = u.regDate ? u.regDate.toDate() : new Date();

            usersData.push({
                id: doc.id,
                name: u.name,
                email: u.email,
                regDate: regDate,
                totalQR: qrSnap.size,
                maxInDay: maxInDay,
                status: u.status || 'active'
            });
        }

        renderUserTable(usersData);
    }

    function renderUserTable(data) {
        const body = document.getElementById('user-list');
        body.innerHTML = "";
        data.forEach(u => {
            const isLocked = u.status === 'locked';
            body.innerHTML += `<tr>
                <td><b>${u.name}</b><br><small>${u.email}</small></td>
                <td data-val="${u.regDate.getTime()}">${u.regDate.toLocaleDateString('vi-VN')}</td>
                <td>${u.totalQR}</td>
                <td>${u.maxInDay}</td>
                <td><span style="color:${isLocked?'red':'green'}">${u.status}</span></td>
                <td>
                    <button class="btn-icon ${isLocked?'btn-unlock':'btn-lock'}" onclick="toggleUser('${u.id}','${isLocked?'active':'locked'}')"><i class="fas fa-${isLocked?'unlock':'lock'}"></i></button>
                    <button class="btn-icon btn-delete" onclick="deleteUser('${u.id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
    }

    // --- SẮP XẾP BẢNG ---
    function sortTable(n) {
        var table, rows, switching, i, x, y, shouldSwitch, dir, switchcount = 0;
        table = document.getElementById("userTable");
        switching = true; dir = "asc"; 
        while (switching) {
            switching = false; rows = table.rows;
            for (i = 1; i < (rows.length - 1); i++) {
                shouldSwitch = false;
                x = rows[i].getElementsByTagName("TD")[n];
                y = rows[i + 1].getElementsByTagName("TD")[n];
                
                let valX = x.hasAttribute('data-val') ? parseInt(x.getAttribute('data-val')) : parseInt(x.innerHTML);
                let valY = y.hasAttribute('data-val') ? parseInt(y.getAttribute('data-val')) : parseInt(y.innerHTML);

                if (dir == "asc") { if (valX > valY) { shouldSwitch = true; break; }
                } else if (dir == "desc") { if (valX < valY) { shouldSwitch = true; break; } }
            }
            if (shouldSwitch) { rows[i].parentNode.insertBefore(rows[i + 1], rows[i]); switching = true; switchcount ++;
            } else { if (switchcount == 0 && dir == "asc") { dir = "desc"; switching = true; } }
        }
    }

    async function deleteUser(id) {
        if(confirm("Cảnh báo: Xóa người dùng này sẽ không thể khôi phục. Tiếp tục?")) {
            await db.collection('users').doc(id).delete();
            loadUsers();
        }
    }

    async function toggleUser(id, st) { await db.collection('users').doc(id).update({ status: st }); loadUsers(); }
    function showSec(id, btn) {
        document.querySelectorAll('.admin-sec').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        if(id === 'users') loadUsers();
    }
    function logoutAdmin() { auth.signOut(); }
</script>
</body>
</html>
