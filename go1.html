<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang kết nối tài liệu... | Thế Giới QR</title>
    
    <link rel="icon" type="image/jpeg" href="logo_Group.jpg">

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 90%;
        }
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #27ae60;
            margin-bottom: 20px;
            object-fit: cover;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #27ae60;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: #2c3e50; margin: 0; font-size: 18px; }
        p { color: #7f8c8d; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="loader-container">
        <img src="logo_Group.jpg" alt="Logo" class="logo">
        <div class="spinner"></div>
        <h2 id="status-title">ĐANG KẾT NỐI TÀI LIỆU...</h2>
        <p id="status-desc">Vui lòng đợi trong giây lát</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCjZfDgE4JFRilXh5dCtrTFLA3-BlerRNE",
            authDomain: "thegioiqr-2026.firebaseapp.com",
            projectId: "thegioiqr-2026",
            storageBucket: "thegioiqr-2026.firebasestorage.app",
            messagingSenderId: "911702916265",
            appId: "1:911702916265:web:d42d948ebb7e7a53dcbdb8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const qrId = urlParams.get('id');

        if (qrId) {
            db.collection('qrcodes').doc(qrId).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    let destinationUrl = "";

                    // LOGIC VẠN NĂNG v1.31
                    if (data.links && Array.isArray(data.links)) {
                        // Nếu là mã mới (Multi-link), lấy link theo chỉ số đang kích hoạt
                        const activeIdx = data.active_index || 0;
                        destinationUrl = data.links[activeIdx].url;
                    } else {
                        // Nếu là mã cũ (v1.x), lấy trường url duy nhất
                        destinationUrl = data.url;
                    }
                    
                    if (destinationUrl) {
                        // Chuẩn hóa link (thêm https nếu thiếu)
                        let finalUrl = destinationUrl.trim();
                        if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                            finalUrl = 'https://' + finalUrl;
                        }
                        
                        // Chuyển hướng
                        window.location.href = finalUrl;
                    } else {
                        throw new Error("Không tìm thấy link đích");
                    }

                } else {
                    document.getElementById('status-title').innerText = "LỖI: MÃ QR KHÔNG TỒN TẠI";
                    document.getElementById('status-desc').innerText = "Mã này có thể đã bị xóa hoặc chưa được tạo.";
                }
            }).catch((error) => {
                console.error("Lỗi:", error);
                document.getElementById('status-title').innerText = "LỖI TRUY XUẤT DỮ LIỆU";
                document.getElementById('status-desc').innerText = "Không thể kết nối với tài liệu hiện tại.";
            });
        } else {
            document.getElementById('status-title').innerText = "THÔNG BÁO";
            document.getElementById('status-desc').innerText = "Vui lòng quét mã QR để truy cập nội dung.";
        }
    </script>
</body>
</html>
