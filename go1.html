<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang kết nối tài liệu... | Thế Giới QR</title>
    <link rel="icon" type="image/jpeg" href="logo_Group.jpg">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #27ae60; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(3600deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2 style="font-size:18px; color:#2c3e50;">ĐANG TẢI TÀI LIỆU...</h2>
        <p style="font-size:14px; color:#7f8c8d;">Vui lòng đợi trong giây lát</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCjZfDgE4JFRilXh5dCtrTFLA3-BlerRNE",
            authDomain: "thegioiqr-2026.firebaseapp.com",
            projectId: "thegioiqr-2026",
            storageBucket: "thegioiqr-2026.firebasestorage.app",
            messagingSenderId: "911702916265",
            appId: "1:911702916265:web:d42d948ebb7e7a53dcbdb8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const qrId = urlParams.get('id');

        async function logAndRedirect() {
            if (!qrId) return;

            try {
                // 1. Lấy dữ liệu mã QR từ Firebase
                const doc = await db.collection('qrcodes').doc(qrId).get();
                if (!doc.exists) return;
                const data = doc.data();

                // 2. Lấy vị trí tương đối qua IP (API miễn phí)
                let locationData = { city: "Không xác định", country: "" };
                try {
                    const response = await fetch('https://ipapi.co/json/');
                    const loc = await response.json();
                    locationData.city = loc.city || "N/A";
                    locationData.country = loc.country_name || "";
                } catch (e) { console.log("Không lấy được IP"); }

                // 3. Ghi log vào Firebase
                await db.collection('click_logs').add({
                    qr_id: qrId,
                    qr_title: data.title || "Không tên",
                    timestamp: firebase.firestore.Timestamp.now(),
                    city: locationData.city,
                    device: navigator.userAgent.includes("Android") ? "Android" : (navigator.userAgent.includes("iPhone") ? "iPhone" : "PC")
                });

                // 4. Chuyển hướng đến link đích
                let targetUrl = data.url;
                if (data.links && Array.isArray(data.links)) {
                    targetUrl = data.links[data.active_index || 0].url;
                }

                if (targetUrl) {
                    let finalUrl = targetUrl.trim();
                    if (!finalUrl.startsWith('http')) finalUrl = 'https://' + finalUrl;
                    window.location.replace(finalUrl);
                }
            } catch (error) {
                console.error("Lỗi:", error);
            }
        }

        logAndRedirect();
    </script>
</body>
</html>
