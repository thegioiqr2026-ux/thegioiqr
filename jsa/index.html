<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VDC JSA - AI Giám định An toàn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; -webkit-tap-highlight-color: transparent; }
        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 24px; height: 24px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-card { animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-100 p-4">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6 pt-2">
            <div>
                <h1 class="text-xl font-black text-red-600 tracking-tight italic uppercase">VDC JSA SAFETY</h1>
                <p class="text-[9px] text-slate-500 font-bold tracking-widest uppercase">Expert: Tran Cong Dep</p>
            </div>
            <button onclick="clearKey()" class="text-[10px] bg-slate-800 px-3 py-1 rounded-full text-slate-400">
                <i class="fas fa-key mr-1"></i> Đổi API
            </button>
        </header>

        <div class="bg-slate-900 rounded-[2.5rem] p-6 shadow-2xl border border-slate-800">
            <div id="apiGroup" class="mb-5">
                <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase ml-1">Cấu hình Google Gemini API:</label>
                <input type="password" id="apiKey" 
                       class="w-full bg-black border border-slate-700 rounded-2xl py-3 px-4 text-xs outline-none focus:border-red-600 text-white transition-all"
                       placeholder="Nhập API Key để bắt đầu...">
            </div>

            <div id="dropZone" class="relative overflow-hidden border-2 border-dashed border-slate-700 rounded-[2rem] aspect-square flex flex-col items-center justify-center bg-black active:scale-95 transition-transform">
                <input type="file" id="imageInput" accept="image/*" capture="environment" class="hidden">
                <div id="uploadPrompt" class="text-center p-6">
                    <div class="w-20 h-20 bg-red-600/10 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-camera text-4xl text-red-600"></i>
                    </div>
                    <p class="text-sm font-black tracking-wide uppercase italic">Chụp hình hiện trường</p>
                </div>
                <img id="imagePreview" src="#" class="absolute inset-0 w-full h-full object-cover hidden">
            </div>

            <button onclick="startAnalysis()" id="analyzeBtn" class="w-full mt-6 bg-red-600 hover:bg-red-700 text-white font-black py-5 rounded-2xl shadow-lg flex items-center justify-center gap-3 active:scale-95">
                <span id="btnText">PHÂN TÍCH JSA</span>
                <div id="spinner" class="loading-spinner hidden"></div>
            </button>
        </div>

        <div id="resultBox" class="mt-8 bg-white rounded-[2rem] p-6 shadow-2xl hidden result-card border-t-4 border-red-600 text-slate-900">
            <div id="resultContent" class="text-sm space-y-4 font-medium"></div>
            <div class="mt-6 pt-4 border-t text-center">
                <a href="tel:0399496319" class="inline-block bg-blue-600 text-white px-8 py-3 rounded-xl font-bold text-xs uppercase italic">Liên hệ Mr. An toàn</a>
            </div>
        </div>

        <footer class="mt-12 text-center pb-10 text-slate-600">
            <p class="text-[10px] font-bold uppercase tracking-[0.3em]">thegioiqr.com | Version 1.4</p>
        </footer>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const preview = document.getElementById('imagePreview');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const apiKeyInput = document.getElementById('apiKey');
        const apiGroup = document.getElementById('apiGroup');

        window.onload = () => {
            const savedKey = localStorage.getItem('vdc_jsa_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
                apiGroup.classList.add('hidden');
            }
        }

        function clearKey() {
            localStorage.removeItem('vdc_jsa_key');
            apiKeyInput.value = "";
            apiGroup.classList.remove('hidden');
        }

        dropZone.onclick = () => imageInput.click();
        imageInput.onchange = function() {
            const [file] = imageInput.files;
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.classList.remove('hidden');
                uploadPrompt.classList.add('hidden');
            }
        };

        async function startAnalysis() {
            const key = apiKeyInput.value.trim();
            if(!key || !imageInput.files[0]) return alert("Thiếu API Key hoặc Ảnh!");

            localStorage.setItem('vdc_jsa_key', key);
            const btn = document.getElementById('analyzeBtn');
            const spinner = document.getElementById('spinner');
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');

            btn.disabled = true;
            document.getElementById('btnText').innerText = "ĐANG PHÂN TÍCH...";
            spinner.classList.remove('hidden');

            try {
                // Đọc file ảnh dưới dạng Base64
                const reader = new FileReader();
                reader.readAsDataURL(imageInput.files[0]);
                reader.onload = async () => {
                    const base64Data = reader.result.split(',')[1];
                    
                    // URL NÀY LÀ CHUẨN NHẤT HIỆN TẠI ĐỂ TRÁNH LỖI NOT FOUND
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Bạn là chuyên gia an toàn Trần Công Đẹp (VDC). Hãy phân tích bức ảnh hiện trường này và trả lời cực ngắn: 1. Điện áp dự đoán. 2. Khoảng cách an toàn tối thiểu theo NĐ 14/2014. 3. Nguy cơ và 3 lời khuyên." },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const text = data.candidates[0].content.parts[0].text;
                    resultContent.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b class="text-red-600">$1</b>').replace(/\n/g, '<br>');
                    resultBox.classList.remove('hidden');
                    btn.disabled = false;
                    document.getElementById('btnText').innerText = "PHÂN TÍCH JSA";
                    spinner.classList.add('hidden');
                };
            } catch (e) {
                alert("LỖI: " + e.message);
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
